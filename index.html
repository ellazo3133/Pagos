<style>body{margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#FAF7F2}.sp{width:38px;height:38px;border:3px solid #E0D8CF;border-top-color:#C9974A;border-radius:50%;animation:s .7s linear infinite}@keyframes s{to{transform:rotate(360deg)}}</style>
</head>
<body><div class="sp"></div>
<script>
const p = location.pathname.replace(/\/+$/,'') || '/';
if (p==='/' || p==='/home' || p==='/index.html') location.replace('/home.html');
else if (p==='/mi-cuenta' || p==='/mi-cuenta.html') location.replace('/mi-cuenta.html');
else if (p==='/admin' || p==='/admin.html') location.replace('/admin.html');
else {
  // Campaign slug — redirect to pago.html preserving slug in ?s=
  const slug = p.replace(/^\//, '');
  location.replace('/pago.html?s=' + encodeURIComponent(slug));
}
</script>
</body></html>
